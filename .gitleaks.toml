title = "FinTechBankX Gitleaks Baseline"

[extend]
useDefault = true

[[allowlists]]
description = "Ignore transient GitHub Actions checkout credentials in .git metadata"
paths = [
  '''\.git/.*'''
]

[[allowlists]]
description = "Allow explicit documentation placeholder token"
regexes = [
  '''tok_1234567890'''
]
paths = [
  '''README\.md'''
]

[[allowlists]]
description = "Allow deterministic internal JWT secret fixtures in test sources"
regexes = [
  '''openfinance\.internal\.security\.jwt-hmac-secret='''
]
paths = [
  '''src/test/.*'''
]
