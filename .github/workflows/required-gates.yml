name: Required Gates

on:
  pull_request:
    branches: [main, dev, staging]
  push:
    branches: [main, dev, staging]

permissions:
  contents: read

jobs:
  build:
    name: ci/build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build
        shell: bash
        run: |
          if [ -f build.gradle ] || [ -f settings.gradle ] || [ -f gradlew ]; then
            if ! gradle --no-daemon clean assemble -x test; then
              if [ -f .ci/allow-gradle-fail ]; then
                echo "Gradle build failed but .ci/allow-gradle-fail is present; continuing."
              else
                exit 1
              fi
            fi
          else
            echo "No Gradle root build in this repository; skipping Gradle build."
          fi
          if [ -f package.json ]; then
            npm ci
            npm run build --if-present
          else
            echo "No package.json build in this repository; skipping Node build."
          fi

  test:
    name: ci/test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        shell: bash
        run: |
          if [ -f build.gradle ] || [ -f settings.gradle ] || [ -f gradlew ]; then
            if ! gradle --no-daemon test; then
              if [ -f .ci/allow-gradle-fail ]; then
                echo "Gradle test failed but .ci/allow-gradle-fail is present; continuing."
              else
                exit 1
              fi
            fi
          else
            echo "No Gradle root test task in this repository; skipping Gradle test."
          fi
          if [ -f package.json ]; then
            npm ci
            npm test --if-present
          else
            echo "No package.json test in this repository; skipping Node test."
          fi

      - name: OpenAPI contract lint
        if: ${{ hashFiles('openapi/*.yaml') != '' || hashFiles('api/openapi/*.yaml') != '' || hashFiles('src/main/resources/openapi/*.yaml') != '' }}
        env:
          NPM_CONFIG_CACHE: /tmp/.npm
        shell: bash
        run: |
          if ls openapi/*.yaml >/dev/null 2>&1; then
            npx -y @redocly/cli@1.27.1 lint openapi/*.yaml
          elif ls api/openapi/*.yaml >/dev/null 2>&1; then
            npx -y @redocly/cli@1.27.1 lint api/openapi/*.yaml
          elif ls src/main/resources/openapi/*.yaml >/dev/null 2>&1; then
            npx -y @redocly/cli@1.27.1 lint src/main/resources/openapi/*.yaml
          fi

      - name: Install oasdiff
        if: ${{ hashFiles('openapi/*.yaml') != '' || hashFiles('api/openapi/*.yaml') != '' || hashFiles('src/main/resources/openapi/*.yaml') != '' }}
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          curl -sSfL https://github.com/oasdiff/oasdiff/releases/download/v1.12.1/oasdiff_1.12.1_linux_amd64.tar.gz \
            | tar -xz -C "$tmpdir"
          sudo install "$tmpdir/oasdiff" /usr/local/bin/oasdiff
          rm -rf "$tmpdir"

      - name: OpenAPI breaking-change guard
        if: ${{ hashFiles('openapi/*.yaml') != '' || hashFiles('api/openapi/*.yaml') != '' || hashFiles('src/main/resources/openapi/*.yaml') != '' }}
        run: ./scripts/ci/oasdiff-breaking.sh

      - name: FAPI/DPoP contract guard
        if: ${{ hashFiles('openapi/*.yaml') != '' || hashFiles('api/openapi/*.yaml') != '' || hashFiles('src/main/resources/openapi/*.yaml') != '' }}
        run: ./scripts/ci/fapi-dpop-guard.sh

      - name: Guardrail - disallow generic map request payloads
        shell: bash
        run: |
          if [ -d src/main/java ]; then
            if grep -R -nE "Map<\s*String\s*,\s*Object\s*>" src/main/java --include="*Controller.java"; then
              echo "Generic Map<String,Object> payloads are disallowed in controllers."
              exit 1
            fi
          else
            echo "No Java controller sources in this repository; guardrail check skipped."
          fi

  security:
    name: ci/security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C "$tmpdir"
          sudo install "$tmpdir/gitleaks" /usr/local/bin/gitleaks
          rm -rf "$tmpdir"

      - name: Run gitleaks (workspace scan)
        shell: bash
        run: |
          gitleaks detect --source . --no-banner --redact --no-git --config .gitleaks.toml \
            --report-format json --report-path gitleaks-report.json || {
              cat gitleaks-report.json
              exit 1
            }
