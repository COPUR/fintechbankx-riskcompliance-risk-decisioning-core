name: Required Gates

on:
  pull_request:
    branches: [main, dev, staging]
  push:
    branches: [main, dev, staging]

permissions:
  contents: read

jobs:
  build:
    name: ci/build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'

      - name: Build
        run: gradle --no-daemon clean assemble -x test

  test:
    name: ci/test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run unit tests
        run: gradle --no-daemon test

      - name: OpenAPI contract lint
        if: ${{ hashFiles('api/openapi/*.yaml') != '' }}
        env:
          NPM_CONFIG_CACHE: /tmp/.npm
        run: npx -y @redocly/cli@1.27.1 lint api/openapi/*.yaml

      - name: Guardrail - disallow generic map request payloads
        shell: bash
        run: |
          if grep -R -nE "Map<\s*String\s*,\s*Object\s*>" src/main/java --include="*Controller.java"; then
            echo "Generic Map<String,Object> payloads are disallowed in controllers."
            exit 1
          fi

  security:
    name: ci/security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C "$tmpdir"
          sudo install "$tmpdir/gitleaks" /usr/local/bin/gitleaks
          rm -rf "$tmpdir"

      - name: Run gitleaks (workspace scan)
        shell: bash
        run: |
          gitleaks detect --source . --no-banner --redact --no-git --config .gitleaks.toml \
            --report-format json --report-path gitleaks-report.json || {
              cat gitleaks-report.json
              exit 1
            }
